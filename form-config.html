<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Schema Config</title>
    <style>
        :root { --border: #2d3542; --accent: #ffaa00; --muted: #8a99ad; --bg: #0b0d10; --card: rgba(18,22,28,0.9); --danger: #ff4a4a; --success: #00ffaa; --purple: #a142ff; --teal: #237a80; }
        *, *::before, *::after { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .page { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; flex-wrap: wrap; gap: 14px; }
        .page-header h1 { margin: 0; font-size: 22px; font-weight: 800; }
        .page-header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
        .btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 9px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; }
        .btn:hover { border-color: var(--accent); color: #fff; }
        .btn-accent { background: var(--accent); color: #0b0d10; border-color: var(--accent); font-weight: 800; }
        .btn-accent:hover { background: #ffbb33; color: #0b0d10; border-color: #ffbb33; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        .btn-success { border-color: var(--success); color: var(--success); }
        .btn-success:hover { background: var(--success); color: #0b0d10; }

        /* Tabs */
        .tab-bar { display: flex; gap: 4px; background: #12161c; border: 1px solid var(--border); border-radius: 8px; padding: 4px; margin-bottom: 28px; width: fit-content; }
        .tab-btn { background: transparent; border: none; color: var(--muted); padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.2s; }
        .tab-btn.active { background: var(--accent); color: #0b0d10; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Form section cards */
        .section-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
        .section-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.75px; }
        .section-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }

        /* Dropdown field rows */
        .field-list { display: flex; flex-direction: column; gap: 12px; }
        .field-row { background: #12161c; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
        .field-row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .field-label-input { background: #171d25; border: 1px solid var(--border); color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 700; outline: none; flex: 1; margin-right: 12px; }
        .field-label-input:focus { border-color: var(--accent); }
        .field-actions { display: flex; gap: 8px; align-items: center; }

        /* Options list inside a field */
        .options-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(45,53,66,0.5); }
        .option-row { display: flex; gap: 8px; align-items: center; }
        .option-input { background: #1c232e; border: 1px solid var(--border); color: #fff; padding: 7px 10px; border-radius: 5px; font-size: 13px; outline: none; flex: 1; }
        .option-input:focus { border-color: var(--accent); }
        .btn-icon { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 5px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; padding: 0; transition: all 0.2s; }
        .btn-icon:hover { border-color: var(--danger); color: var(--danger); }
        .btn-icon.add:hover { border-color: var(--success); color: var(--success); }
        .add-option-row { display: flex; gap: 8px; margin-top: 6px; }
        .add-option-input { background: #1c232e; border: 1px dashed #3d4f66; color: #fff; padding: 7px 10px; border-radius: 5px; font-size: 13px; outline: none; flex: 1; }
        .add-option-input:focus { border-color: var(--success); border-style: solid; }
        .add-option-btn { background: rgba(0,255,170,0.08); border: 1px solid var(--success); color: var(--success); padding: 7px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap; }
        .add-option-btn:hover { background: var(--success); color: #0b0d10; }

        /* Add new field */
        .add-field-row { background: rgba(255,170,0,0.04); border: 2px dashed rgba(255,170,0,0.25); border-radius: 8px; padding: 14px 16px; display: flex; gap: 12px; align-items: center; }
        .add-field-input { background: #12161c; border: 1px solid var(--border); color: #fff; padding: 9px 14px; border-radius: 6px; font-size: 13px; outline: none; flex: 1; }
        .add-field-input:focus { border-color: var(--accent); }

        /* Save banner */
        .save-banner { position: fixed; bottom: 24px; right: 24px; background: #1c232e; border: 1px solid var(--success); border-radius: 10px; padding: 14px 20px; display: flex; gap: 14px; align-items: center; box-shadow: 0 8px 30px rgba(0,0,0,0.5); z-index: 100; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
        .save-banner.show { transform: translateY(0); opacity: 1; }
        .save-banner span { color: var(--muted); font-size: 13px; font-weight: 600; }

        .tag-new { background: rgba(0,255,170,0.1); color: var(--success); border: 1px solid rgba(0,255,170,0.3); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-left: 6px; }
        .tag-custom { background: rgba(161,66,255,0.1); color: #c07aff; border: 1px solid rgba(161,66,255,0.3); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-left: 6px; }
    </style>
</head>
<body>
<div class="page">
    <div class="page-header">
        <div>
            <h1>⚙ Form Schema Config</h1>
            <p>Add, edit, or remove dropdown fields and their values across all entry types. Changes apply immediately to new submissions.</p>
        </div>
        <div style="display:flex;gap:10px;">
            <button class="btn" onclick="window.location.href='dashboard.html'">&larr; Back to Records</button>
            <button class="btn btn-success" onclick="saveAllConfig()">Save All Changes</button>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('f1')">Activity Log (A)</button>
        <button class="tab-btn" onclick="switchTab('f2')">Incident Report (B)</button>
        <button class="tab-btn" onclick="switchTab('f3t1')">Site Survey (C1)</button>
        <button class="tab-btn" onclick="switchTab('f3t2')">Route Log (C2)</button>
    </div>

    <div id="tab-f1" class="tab-content active"></div>
    <div id="tab-f2" class="tab-content"></div>
    <div id="tab-f3t1" class="tab-content"></div>
    <div id="tab-f3t2" class="tab-content"></div>
</div>

<div class="save-banner" id="saveBanner">
    <span>Unsaved changes</span>
    <button class="btn-accent btn" onclick="saveAllConfig()">Save Now</button>
</div>

<script>
// ── Default schema ────────────────────────────────────────────
// Each form has a list of dropdown "fields". Each field has a key (maps to payload), label, and options[].
var DEFAULT_CONFIG = {
    f1: [
        { key: 'dropdown_1', label: 'Field Office', options: ['District Office', 'Regional HQ', 'Field Unit', 'Partner Agency'], locked: false },
        { key: 'dropdown_2', label: 'Communication Channel', options: ['Radio', 'Phone', 'In-Person', 'Email', 'Satellite'], locked: false },
        { key: 'dropdown_3', label: 'Activity Type', options: ['Site Visit', 'Aid Distribution', 'Community Meeting', 'Assessment', 'Miscellaneous'], locked: false }
    ],
    f2: [
        { key: 'locationZone', label: 'Camp / Site', options: ['Base Camp Alpha', 'Base Camp Bravo', 'Field Station Gamma', 'Transit Hub', 'Partner Site'], locked: false },
        { key: 'primaryClassification', label: 'Reported By', options: ['Field Officer', 'Partner Agency', 'Community Member', 'Internal Staff'], locked: false },
        { key: 'secondaryVariable', label: 'Aid Type', options: ['Medical Supplies', 'Food & Water', 'Shelter Materials', 'Logistics Equipment'], locked: false },
        { key: 'envFactor', label: 'Incident Severity', options: ['Low', 'Moderate', 'High', 'Critical'], locked: false },
        { key: 'routingProtocol', label: 'Resolution Status', options: ['Resolved', 'Pending', 'Escalated', 'Unresolved'], locked: false }
    ],
    f3t1: [
        { key: 'profile', label: 'Site Name', options: ['Camp Alpha', 'Camp Bravo', 'Field Station Gamma', 'Transit Point'], locked: false },
        { key: 'protocol', label: 'Site Type', options: ['Base Camp', 'Medical Post', 'Distribution Centre', 'Observation Post'], locked: false },
        { key: 'allocation', label: 'Region', options: ['North Zone', 'South Zone', 'East Zone', 'West Zone'], locked: false },
        { key: 'priority', label: 'Access Level', options: ['Open', 'Restricted', 'Emergency Only'], locked: false }
    ],
    f3t2: [
        { key: 'routingPool', label: 'Team / Unit', options: ['Logistics Team', 'Medical Team', 'Assessment Team', 'Security Escort'], locked: false },
        { key: 'fallbackSequence', label: 'Vehicle / Transport', options: ['4x4 Vehicle', 'Truck', 'Motorcycle', 'On Foot', 'Boat'], locked: false },
        { key: 'telemetryWindow', label: 'Route Type', options: ['Primary Road', 'Secondary Road', 'Off-Road', 'River Route'], locked: false }
    ]
};

var config = {};
var dirty = false;

function loadConfig() {
    var saved = localStorage.getItem('form_dropdown_config');
    if (saved) {
        try { config = JSON.parse(saved); }
        catch(e) { config = JSON.parse(JSON.stringify(DEFAULT_CONFIG)); }
    } else {
        config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    }
}

function saveAllConfig() {
    localStorage.setItem('form_dropdown_config', JSON.stringify(config));
    dirty = false;
    document.getElementById('saveBanner').classList.remove('show');
    // Flash success
    var btn = document.querySelector('.btn-success');
    var orig = btn.textContent;
    btn.textContent = '✓ Saved!';
    btn.style.background = 'var(--success)';
    btn.style.color = '#0b0d10';
    setTimeout(function() { btn.textContent = orig; btn.style.background=''; btn.style.color=''; }, 1500);
}

function markDirty() {
    dirty = true;
    document.getElementById('saveBanner').classList.add('show');
}

function switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach(function(b,i) {
        var tabs = ['f1','f2','f3t1','f3t2'];
        b.classList.toggle('active', tabs[i] === id);
    });
    document.querySelectorAll('.tab-content').forEach(function(c) {
        c.classList.toggle('active', c.id === 'tab-'+id);
    });
}

// ── Render a single form tab ──────────────────────────────────
function renderTab(formKey) {
    var container = document.getElementById('tab-'+formKey);
    var fields = config[formKey] || [];
    var html = '<div class="field-list">';

    fields.forEach(function(field, fi) {
        var isCustom = field.custom ? true : false;
        html += '<div class="field-row" id="field-'+formKey+'-'+fi+'">'
            +'<div class="field-row-header">'
            +'<div style="display:flex;align-items:center;flex:1;">'
            +'<input class="field-label-input" value="'+escHtml(field.label)+'" onchange="updateFieldLabel(\''+formKey+'\','+fi+',this.value)" placeholder="Dropdown label...">'
            +(isCustom ? '<span class="tag-custom">CUSTOM</span>' : '')
            +'</div>'
            +'<div class="field-actions">'
            +'<button class="btn btn-danger" onclick="removeField(\''+formKey+'\','+fi+')" style="padding:6px 12px;font-size:11px;">Remove Field</button>'
            +'</div>'
            +'</div>'
            +'<div style="font-size:10px;color:var(--muted);margin-bottom:6px;font-weight:700;">Key: <code style="color:#a142ff;">'+field.key+'</code> &nbsp;|&nbsp; '+field.options.length+' options</div>'
            +'<div class="options-list" id="opts-'+formKey+'-'+fi+'">';

        field.options.forEach(function(opt, oi) {
            html += '<div class="option-row" id="opt-'+formKey+'-'+fi+'-'+oi+'">'
                +'<input class="option-input" value="'+escHtml(opt)+'" onchange="updateOption(\''+formKey+'\','+fi+','+oi+',this.value)">'
                +'<button class="btn-icon" onclick="removeOption(\''+formKey+'\','+fi+','+oi+')" title="Remove">✕</button>'
                +'</div>';
        });

        html += '</div>'
            +'<div class="add-option-row">'
            +'<input class="add-option-input" id="newopt-'+formKey+'-'+fi+'" placeholder="New option value..." onkeydown="if(event.key===\'Enter\')addOption(\''+formKey+'\','+fi+')">'
            +'<button class="add-option-btn" onclick="addOption(\''+formKey+'\','+fi+'\')">+ Add Option</button>'
            +'</div>'
            +'</div>';
    });

    // Add new field row
    html += '<div class="add-field-row">'
        +'<input class="add-field-input" id="newfield-label-'+formKey+'" placeholder="New dropdown label (e.g. Priority Level)..." onkeydown="if(event.key===\'Enter\')addField(\''+formKey+'\')">'
        +'<button class="btn-accent btn" onclick="addField(\''+formKey+'\')">+ Add Dropdown</button>'
        +'</div>';

    html += '</div>';
    container.innerHTML = html;
}

function renderAll() {
    ['f1','f2','f3t1','f3t2'].forEach(renderTab);
}

// ── Mutations ─────────────────────────────────────────────────
function updateFieldLabel(fk, fi, val) {
    config[fk][fi].label = val;
    markDirty();
}
function updateOption(fk, fi, oi, val) {
    config[fk][fi].options[oi] = val;
    markDirty();
}
function removeOption(fk, fi, oi) {
    config[fk][fi].options.splice(oi, 1);
    markDirty(); renderTab(fk);
}
function addOption(fk, fi) {
    var inp = document.getElementById('newopt-'+fk+'-'+fi);
    var val = inp.value.trim();
    if (!val) { inp.focus(); return; }
    config[fk][fi].options.push(val);
    inp.value = '';
    markDirty(); renderTab(fk);
}
function removeField(fk, fi) {
    if (!confirm('Remove the "'+config[fk][fi].label+'" dropdown? This only affects new submissions.')) return;
    config[fk].splice(fi, 1);
    markDirty(); renderTab(fk);
}
function addField(fk) {
    var inp = document.getElementById('newfield-label-'+fk);
    var label = inp.value.trim();
    if (!label) { inp.focus(); return; }
    // Generate a safe key from the label
    var key = 'custom_' + label.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_');
    config[fk].push({ key: key, label: label, options: [], custom: true });
    inp.value = '';
    markDirty(); renderTab(fk);
}

function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Boot
loadConfig();
renderAll();
</script>
</body>
</html>
