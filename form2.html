<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Incident Report — Form B</title>
    <style>
        body,html{margin:0;padding:0;background:#0b0d10;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#fff;}
        .viewport-wrapper{display:flex;justify-content:center;padding:40px 20px;box-sizing:border-box;min-height:100vh;}
        .form-card{width:100%;max-width:900px;background:rgba(18,22,28,0.85);border:2px solid #2d3542;border-top:6px solid #237a80;border-radius:14px;padding:40px;box-shadow:0 20px 50px rgba(0,0,0,0.6);backdrop-filter:blur(10px);}
        .form-header{border-bottom:1px solid #2d3542;padding-bottom:20px;margin-bottom:30px;display:flex;justify-content:space-between;align-items:center;}
        .form-title{margin:0;font-size:24px;font-weight:800;}
        .btn-cancel{background:transparent;border:1px solid #343e4c;color:#8a99ad;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;}
        .btn-cancel:hover{border-color:#ef4444;color:#fff;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;}
        .form-row.single{grid-template-columns:1fr;}
        .field-group{display:flex;flex-direction:column;gap:8px;}
        label{color:#8a99ad;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
        input[type="text"],input[type="date"],input[type="time"],select{background:#171d25;border:2px solid #343e4c;color:#fff;padding:12px 16px;border-radius:8px;font-size:14px;outline:none;box-sizing:border-box;width:100%;transition:border-color 0.2s;}
        input:focus,select:focus{border-color:#ffaa00;}
        .coordinate-container{background:#12161c;border:2px dashed #343e4c;border-radius:10px;padding:20px;}
        .coordinate-inputs{display:grid;grid-template-columns:1fr 1fr auto;gap:16px;align-items:center;}
        .coord-prefix{display:flex;align-items:center;background:#1c242f;border:2px solid #343e4c;border-radius:8px;overflow:hidden;}
        .coord-label{background:#222d3a;color:#ffaa00;padding:12px;font-size:12px;font-weight:800;border-right:2px solid #343e4c;}
        .coord-prefix input{border:none;background:transparent;padding:12px;color:#fff;outline:none;width:100%;font-family:monospace;}
        .btn-map-trigger{background:#ffaa00;color:#0b0d10;border:none;width:45px;height:45px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
        .btn-map-trigger:hover{background:#e09600;}
        .footer-actions{margin-top:40px;border-top:1px solid #2d3542;padding-top:25px;display:flex;justify-content:flex-end;}
        .btn-submit{background:#ffaa00;color:#0b0d10;border:none;padding:14px 30px;font-size:15px;font-weight:800;border-radius:8px;cursor:pointer;}
        .btn-submit:hover{opacity:0.9;}
        /* dynamic rows */
        .dyn-row{display:grid;gap:24px;margin-bottom:24px;}
        .dyn-row.cols1{grid-template-columns:1fr;}
        .dyn-row.cols2{grid-template-columns:1fr 1fr;}
        .dyn-row.cols3{grid-template-columns:1fr 1fr 1fr;}
    </style>
</head>
<body>
<div class="viewport-wrapper">
    <div class="form-card">
        <div class="form-header">
            <h1 class="form-title">Incident Report</h1>
            <button class="btn-cancel" onclick="window.location.href='selection.html'">Cancel</button>
        </div>
        <form id="form2ID">
            <!-- Fixed: Date & Time -->
            <div class="form-row">
                <div class="field-group"><label>Log Execution Date</label><input type="date" id="f2Date" required></div>
                <div class="field-group"><label>Log Execution Time</label><input type="time" id="f2Time" required></div>
            </div>
            <!-- Fixed: Reference ID -->
            <div class="form-row single">
                <div class="field-group"><label>Case / Incident ID</label><input type="text" id="f2IdIndex" placeholder="Enter details"></div>
            </div>
            <!-- Dynamic dropdowns -->
            <div id="dynF2Container"></div>
            <!-- Fixed: Coordinate fields -->
            <div class="form-row single">
                <div class="field-group coordinate-container">
                    <label style="margin-bottom:10px;display:block;color:#ffaa00;">Location A</label>
                    <div class="coordinate-inputs">
                        <div class="coord-prefix"><span class="coord-label">LAT</span><input type="text" id="f2Lat1" placeholder="00.000000"></div>
                        <div class="coord-prefix"><span class="coord-label">LNG</span><input type="text" id="f2Lng1" placeholder="00.000000"></div>
                        <button type="button" class="btn-map-trigger" title="Fetch Coordinates">🎯</button>
                    </div>
                </div>
            </div>
            <div class="form-row single">
                <div class="field-group coordinate-container">
                    <label style="margin-bottom:10px;display:block;color:#ffaa00;">Location B</label>
                    <div class="coordinate-inputs">
                        <div class="coord-prefix"><span class="coord-label">LAT</span><input type="text" id="f2Lat2" placeholder="00.000000"></div>
                        <div class="coord-prefix"><span class="coord-label">LNG</span><input type="text" id="f2Lng2" placeholder="00.000000"></div>
                        <button type="button" class="btn-map-trigger" title="Fetch Coordinates">🎯</button>
                    </div>
                </div>
            </div>
            <!-- Fixed: Remarks & Auth -->
            <div class="form-row">
                <div class="field-group"><label>Incident Category</label><input type="text" id="f2Remarks" placeholder="Enter details"></div>
                <div class="field-group"><label>Items Recovered / Delivered</label><input type="text" id="f2Auth" placeholder="Enter details"></div>
            </div>
            <div class="footer-actions"><button type="submit" class="btn-submit">Submit</button></div>
        </form>
    </div>
</div>
<script>
var DEFAULT_F2 = [
    { key:'locationZone', label:'Regional Location Zone', options:['Zone Alpha','Zone Bravo','Zone Gamma'] },
    { key:'primaryClassification', label:'Source', options:['Standard Active','High Priority'] },
    { key:'secondaryVariable', label:'Equipment', options:['Type A','Type B'] },
    { key:'envFactor', label:'Secondary Equipment', options:['Option A','Option B'] },
    { key:'routingProtocol', label:'Result', options:['Result A','Result B'] }
];
function getF2Config() {
    try { var c=JSON.parse(localStorage.getItem('form_dropdown_config')); if(c&&c.f2&&c.f2.length) return c.f2; } catch(e) {}
    return DEFAULT_F2;
}
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function renderF2Dropdowns() {
    var fields = getF2Config();
    var ct = document.getElementById('dynF2Container');
    var html = '';
    for (var i=0; i<fields.length; i+=2) {
        var chunk = fields.slice(i, Math.min(i+2, fields.length));
        var cls = chunk.length===1?'cols1':'cols2';
        html += '<div class="dyn-row '+cls+'">';
        chunk.forEach(function(f){
            html += '<div class="field-group"><label>'+escHtml(f.label)+'</label><select id="dyn2_'+f.key+'" required>'
                + '<option value="" disabled selected hidden>Select '+escHtml(f.label)+'...</option>';
            f.options.forEach(function(o){ html += '<option value="'+escHtml(o)+'">'+escHtml(o)+'</option>'; });
            html += '</select></div>';
        });
        if(chunk.length===1) html += '<div></div>';
        html += '</div>';
    }
    ct.innerHTML = html;
}
renderF2Dropdowns();
 
document.getElementById('form2ID').addEventListener('submit', function(e) {
    e.preventDefault();
    var fields = getF2Config();
    var dynPayload = {};
    fields.forEach(function(f){ var el=document.getElementById('dyn2_'+f.key); if(el) dynPayload[f.key]=el.value; });
    var activeOrbat = JSON.parse(sessionStorage.getItem('temp_active_selection')) || {};
    var tx = {
        id: 'EVT-'+Math.floor(10000+Math.random()*90000),
        timestamp: new Date().toISOString().replace('T',' ').substring(0,19),
        formType: "Form 2",
        orbatContext: activeOrbat,
        payload: Object.assign({
            manifestDate: document.getElementById('f2Date').value,
            manifestTime: document.getElementById('f2Time').value,
            identifierIndex: document.getElementById('f2IdIndex').value,
            primaryCoords: { lat: document.getElementById('f2Lat1').value, lng: document.getElementById('f2Lng1').value },
            boundaryCoords: { lat: document.getElementById('f2Lat2').value, lng: document.getElementById('f2Lng2').value },
            remarks: document.getElementById('f2Remarks').value,
            authSignOff: document.getElementById('f2Auth').value
        }, dynPayload)
    };
    var recs = JSON.parse(localStorage.getItem('universal_event_collector')) || [];
    recs.push(tx);
    localStorage.setItem('universal_event_collector', JSON.stringify(recs));
    sessionStorage.removeItem('temp_active_selection');
    alert("Incident report submitted..");
    this.reset(); renderF2Dropdowns();
});
</script>
</body>
</html>
