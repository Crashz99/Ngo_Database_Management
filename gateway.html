<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpLog Gateway</title>
    <style>
        body,html{margin:0;padding:0;height:100vh;overflow:hidden;background-color:#0b0d10;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
        .viewport-wrapper{display:flex;align-items:center;justify-content:center;height:100vh;padding:30px;box-sizing:border-box;}
        .gateway-card{width:100%;max-width:800px;background:rgba(18,22,28,0.85);border:2px solid #2d3542;border-top:6px solid #ffaa00;border-radius:14px;padding:50px;box-shadow:0 20px 50px rgba(0,0,0,0.6);box-sizing:border-box;backdrop-filter:blur(10px);text-align:center;}
        .gateway-title{color:#ffffff;font-size:26px;font-weight:800;margin:0 0 10px 0;}
        .gateway-subtitle{color:#8a99ad;font-size:14px;margin:0 0 35px 0;}
        .action-split{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
        .action-panel{background:#171d25;border:2px solid #343e4c;border-radius:10px;padding:35px 20px;cursor:pointer;transition:all 0.2s ease;}
        .action-panel:hover{border-color:#ffaa00;background:#1c242f;transform:translateY(-4px);}
        .panel-icon{font-size:36px;margin-bottom:12px;}
        .panel-title{color:#ffffff;font-size:18px;font-weight:700;margin-bottom:8px;}
        .panel-desc{color:#8a99ad;font-size:13px;line-height:1.4;margin:0;}
        .btn-logout{background-color:#8a99ad;border:none;color:#fff;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:700;font-size:13px;}
        .glass-card{max-width:600px;margin:30px auto;padding:25px;border:2px dashed #2d3542;border-radius:12px;background:rgba(18,22,28,0.5);text-align:center;}
    </style>
</head>
<body>
<div class="viewport-wrapper">
    <div class="gateway-card">
        <h1 class="gateway-title">OpLog — Field Operations Dashboard</h1>
        <p class="gateway-subtitle">Choose an action to proceed.</p>
        <div class="action-split">
            <div class="action-panel" onclick="window.location.href='entity-selector.html'">
                <div class="panel-icon">✍️</div>
                <div class="panel-title">New Field Entry</div>
                <p class="panel-desc">Submit a new new log entry.</p>
            </div>
            <div class="action-panel" onclick="window.location.href='dashboard.html'">
                <div class="panel-icon">📊</div>
                <div class="panel-title">View Records</div>
                <p class="panel-desc">Browse and search all submitted field records.</p>
            </div>
        </div>
        <br><br>
        <div class="logout-section">
            <button class="btn-logout" onclick="window.location.href='index.html'">🔒 Logout</button>
        </div>
        <div class="glass-card">
            <h3 style="margin-top:0;color:#ffaa00;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:1px;">Import Archive</h3>
            <p style="color:#8a99ad;font-size:13px;margin-bottom:20px;">Upload a previously exported JSON records file. Records will be parsed and merged into local storage.</p>
            <label for="archiveFileInput" style="display:inline-block;background:#12161c;border:1px solid #2d3542;color:#fff;padding:12px 24px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s ease;"
                   onmouseover="this.style.borderColor='#00ffaa';this.style.color='#00ffaa';"
                   onmouseout="this.style.borderColor='#2d3542';this.style.color='#fff';">
                Choose Archive File (.json)
            </label>
            <input type="file" id="archiveFileInput" accept=".json" style="display:none;" onchange="executeImport(event)">
            <div id="importFeedback" style="margin-top:15px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;"></div>
        </div>
    </div>
</div>
<script>
function executeImport(event) {
    var file = event.target.files[0];
    var feedback = document.getElementById('importFeedback');
    if (!file) return;
    feedback.style.color = '#8a99ad';
    feedback.innerText = "Parsing file...";
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var incoming = JSON.parse(e.target.result);
            if (!Array.isArray(incoming)) { feedback.style.color='#ff4a4a'; feedback.innerText="Import failed: invalid format."; return; }
            var db = JSON.parse(localStorage.getItem('universal_event_collector')) || [];
            var existing = new Set(db.map(function(r){return r.id;}).filter(Boolean));
            var added = 0;
            incoming.forEach(function(rec) {
                if (!rec.id) rec.id = 'imported-' + Math.random().toString(36).substr(2,9).toUpperCase();
                if (!existing.has(rec.id)) { db.push(rec); added++; }
            });
            localStorage.setItem('universal_event_collector', JSON.stringify(db));
            feedback.style.color = '#00ffaa';
            feedback.innerText = "Import complete: +" + added + " records added.";
            event.target.value = '';
        } catch(err) {
            feedback.style.color = '#ff4a4a';
            feedback.innerText = "Error: could not parse file.";
        }
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
